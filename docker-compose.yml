services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-curriculum}
      POSTGRES_USER: ${POSTGRES_USER:-curriculum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-curriculum}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-curriculum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - media_data:/media:ro
      - static_data:/static:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_data:
  static_data:
